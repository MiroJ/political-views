<div class="questionnaire-container">
    <div class="header">
        <h1>Политически въпросник</h1>
        <div class="progress-bar">
            <div class="progress-fill" [style.width.%]="progress"></div>
        </div>
        <p class="progress-text">Въпрос {{ currentQuestionIndex + 1 }} от {{ questions.length }}</p>
    </div>

    <div class="question-section" *ngIf="currentQuestion">
        <h2>{{ currentQuestion.questionText }}</h2>

        <div class="answers">
            <div class="answer-option" *ngFor="let answer of currentQuestion.answers; let i = index" [class.selected]="selectedAnswerIndex === i" (click)="selectAnswer(i)">
                {{ answer.option }}
            </div>
        </div>
    </div>

    <div class="navigation">
        <button class="btn btn-secondary" (click)="previousQuestion()" [disabled]="currentQuestionIndex === 0">
            Предишен
        </button>

        <button class="btn btn-primary" (click)="nextQuestion()" [disabled]="!canGoNext()">
            {{ currentQuestionIndex < questions.length - 1 ? 'Следващ' : 'Виж резултати' }} </button>
    </div>
</div>
